    <!-- ===== RC1 左上 ===== -->
    <text
       x="70"
       y="144"
       class="rc-num"
       fill="#1B6B5E"
       id="text36">RC1</text>
    <text
       x="110"
       y="144"
       class="rc-title"
       fill="#0e4a40"
       id="text37">西部传媒类专业大学生智能素养核心内涵与现状诊断</text>
    <text
       x="70"
       y="172"
       class="rc-question"
       fill="#555555"
       id="text38">核心问题：什么是传媒学子的智能素养？西部现状如何？</text>
    <text
       x="70"
       y="196"
       class="rc-question"
       fill="#333333"
       id="text39">构成要素界定：认知、工具、批判、伦理四维框架</text>
    <text
       x="70"
       y="226"
       class="rc-method"
       fill="#555555"
       id="text40">方法：文献分析 + 比较研究 + Delphi专家咨询</text>
    <text
       x="70"
       y="248"
       class="rc-method"
       fill="#555555"
       id="text41">调研：面向西部多校传媒学生的问卷+访谈+平台数据</text>
    <text
       x="70"
       y="290"
       class="rc-output"
       fill="#946B0A"
       id="text42">产出：四维素养框架模型 + 西部现状诊断报告</text>
    <text
       x="70"
       y="312"
       class="rc-method"
       fill="#555555"
       id="text43">（含校际差异、专业差异、东西部差距量化数据）</text>
    <!-- ===== RC2 右上 ===== -->
    <text
       x="590"
       y="144"
       class="rc-num"
       fill="#1B6B5E"
       id="text44">RC2</text>
    <text
       x="630"
       y="144"
       class="rc-title"
       fill="#0e4a40"
       id="text45">&quot;分层-融合-浸润&quot;式智能素养课程体系优化与重构</text>
    <text
       x="590"
       y="172"
       class="rc-question"
       fill="#555555"
       id="text46">核心问题：如何把智能素养系统嵌入现有课程体系？</text>
    <text
       x="590"
       y="196"
       class="rc-question"
       fill="#333333"
       id="text47">三层架构：通识必修 → 专业融合 → 特色拓展</text>
    <text
       x="590"
       y="226"
       class="rc-method"
       fill="#555555"
       id="text48">通识层：AI与传媒伦理（必修）+ 大数据基础</text>
    <text
       x="590"
       y="244"
       class="rc-method"
       fill="#555555"
       id="text49">融合层：智能新闻写作、AI影像、数据可视化</text>
    <text
       x="590"
       y="262"
       class="rc-method"
       fill="#555555"
       id="text50">拓展层：智能文旅、AI+非遗传播（西部特色）</text>
    <text
       x="590"
       y="290"
       class="rc-output"
       fill="#946B0A"
       id="text51">产出：本硕贯通课程群方案 + 各课程教学大纲</text>
    <text
       x="590"
       y="312"
       class="rc-method"
       fill="#555555"
       id="text52">（依托培养方案修订和课程大纲修订契机落地）</text>
    <!-- ===== RC3 左下 ===== -->
    <text
       x="70"
       y="444"
       class="rc-num"
       fill="#1B6B5E"
       id="text53">RC3</text>
    <text
       x="110"
       y="444"
       class="rc-title"
       fill="#0e4a40"
       id="text54"><tspan
         style="font-style:normal;font-variant:normal;font-weight:bold;font-stretch:normal;font-family:'Microsoft YaHei';-inkscape-font-specification:'Microsoft YaHei Bold'"
         id="tspan82">“理论奠基+实践驱动+反思深化”教学模式创新</tspan></text>
    <text
       x="70"
       y="472"
       class="rc-question"
       fill="#555555"
       id="text55">核心问题：如何在课堂中有效培养智能素养？</text>
    <text
       x="70"
       y="496"
       class="rc-question"
       fill="#333333"
       id="text56">能力链条：选题敏感 → 问题转化 → 技术实现 → 伦理审视</text>
    <text
       x="70"
       y="526"
       class="rc-method"
       fill="#555555"
       id="text57">理论奠基：概念与基础理论课程讲授</text>
    <text
       x="70"
       y="544"
       class="rc-method"
       fill="#555555"
       id="text58">实践驱动：真实问题导向PBL + 校企共建平台</text>
    <text
       x="70"
       y="562"
       class="rc-method"
       fill="#555555"
       id="text59">反思深化：反思报告 + 同伴互评 + 导师诊断</text>
    <text
       x="70"
       y="590"
       class="rc-output"
       fill="#946B0A"
       id="text60">产出：教学模式方案 + 学生能力发展案例库</text>
    <text
       x="70"
       y="612"
       class="rc-method"
       fill="#555555"
       id="text61">（两轮行动研究，覆盖新闻/广告/广编三专业）</text>
    <!-- ===== RC4 右下 ===== -->
    <text
       x="590"
       y="444"
       class="rc-num"
       fill="#1B6B5E"
       id="text62">RC4</text>
    <text
       x="630"
       y="444"
       class="rc-title"
       fill="#0e4a40"
       id="text63">面向智能素养发展的多元评价与持续改进机制</text>
    <text
       x="590"
       y="472"
       class="rc-question"
       fill="#555555"
       id="text64">核心问题：如何科学衡量&quot;人机协同创意能力&quot;？</text>
    <text
       x="590"
       y="496"
       class="rc-question"
       fill="#333333"
       id="text65">三维体系：能力全覆盖 + 主体多元化 + 反馈动态化</text>
    <text
       x="590"
       y="526"
       class="rc-method"
       fill="#555555"
       id="text66">维度：创意质量 + 工具应用 + 人机协作 + 伦理合规</text>
    <text
       x="590"
       y="544"
       class="rc-method"
       fill="#555555"
